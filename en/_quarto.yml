project:
  type: book
  output-dir: docs

bibliography: myBiber.bib

book:
  title: "Exercises in Psychological Statistics"
  subtitle: "with R/RStudio"
  author:
  - name: "Koji Kosugi"
    orcid: 0000-0001-5816-0099
    email: classkosugitti@gmail.com
  page-navigation: true
  search: true
  downloads: [pdf, epub]
  sharing: [twitter, facebook]
  cover-image: cover.png
  date: ""
  sidebar:
    tools:
      - icon: translate
        href: "../index.html"
        text: "日本語版 (Japanese)"
  chapters:
    - index.qmd
    - chapter01.qmd
    - chapter02.qmd
    - chapter03.qmd
    - chapter04.qmd
    - chapter05.qmd
    - chapter06.qmd
    - chapter07.qmd
    - chapter08.qmd
    - chapter09.qmd
    - chapter10.qmd
    - chapter11.qmd
    - chapter12.qmd
    - chapter13.qmd
    - chapter14.qmd
    - chapter15.qmd
    - chapter16.qmd
    - chapter17.qmd
    - practices.qmd
    - references.qmd
    - afterword.qmd
    - install_guide.qmd

format:
  html:
    theme: bootstrap5
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: false
    code-tools: false
    dev: ragg_png
    lang: en
  pdf:
    documentclass: ltjsbook
    pdf-engine: lualatex
    papersize: a4
    geometry:
      - top=30mm
      - left=20mm
      - heightrounded
    colorlinks: true
    lang: en
  epub:
    cover-image: cover.png
    lang: en
